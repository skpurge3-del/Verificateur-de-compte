<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse de Numéro - WhatsApp Business</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #10141c 0%, #1a1f2a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            background: rgba(18, 22, 32, 0.9);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            max-width: 550px;
            width: 100%;
            padding: 28px 30px 38px;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(72, 187, 120, 0.15);
            transition: all 0.2s;
        }
        h1 {
            font-size: 1.7rem;
            font-weight: 600;
            margin: 0 0 6px 0;
            color: #eef2ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        h1 small {
            font-size: 0.75rem;
            font-weight: normal;
            background: #2d3748;
            padding: 2px 10px;
            border-radius: 40px;
            color: #a0f0c0;
        }
        .sub {
            color: #8e9aaf;
            border-left: 3px solid #34d399;
            padding-left: 12px;
            margin: 8px 0 20px 0;
            font-size: 0.85rem;
        }
        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 28px;
        }
        input {
            flex: 2;
            background: #0b0e16;
            border: 1px solid #2a3448;
            padding: 14px 18px;
            border-radius: 60px;
            font-size: 1rem;
            color: white;
            outline: none;
            transition: 0.2s;
        }
        input:focus {
            border-color: #34d399;
            box-shadow: 0 0 0 2px rgba(52, 211, 153, 0.3);
        }
        button {
            background: #34d399;
            border: none;
            padding: 0 28px;
            border-radius: 60px;
            font-weight: bold;
            font-size: 0.95rem;
            color: #0a0f1a;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(52, 211, 153, 0.2);
        }
        button:hover {
            background: #2ebd87;
            transform: scale(0.97);
        }
        .result {
            background: #0f131ecc;
            border-radius: 32px;
            padding: 20px;
            margin-top: 15px;
            border: 1px solid #2c354a;
        }
        .numero {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            background: #00000055;
            display: inline-block;
            padding: 6px 18px;
            border-radius: 60px;
            margin-bottom: 18px;
            color: #cbd5ff;
        }
        .solidite {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 2px dashed #2a3440;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }
        .pourcentage {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c0f0d0, #34d399);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .badge {
            background: #1e2a2f;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .grid-metrics {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 20px 0;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric span:first-child {
            color: #b9c3e6;
            font-size: 0.85rem;
        }
        .bar-bg {
            width: 200px;
            height: 8px;
            background: #202433;
            border-radius: 10px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            background: #34d399;
            width: 0%;
            border-radius: 10px;
        }
        .value {
            font-weight: 600;
            min-width: 45px;
            text-align: right;
            color: #e2e8ff;
        }
        .warning {
            background: #2a2118;
            border-left: 4px solid #fbbf24;
            padding: 12px 16px;
            border-radius: 20px;
            margin-top: 20px;
            font-size: 0.8rem;
            color: #fdebb3;
        }
        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 28px;
            color: #56607c;
        }
        .creator-credit {
            text-align: center;
            margin-top: 8px;
            font-size: 0.75rem;
            color: #7c86a3;
            font-style: italic;
            letter-spacing: 0.3px;
        }
        .creator-credit span {
            background: linear-gradient(135deg, #34d399, #a0f0c0);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-weight: 600;
        }
        @media (max-width: 500px) {
            .card { padding: 20px; }
            .bar-bg { width: 130px; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>📊 WA Business <small>analyse pro</small></h1>
    <div class="sub">🔍 Vérification intelligente · Indice de solidité</div>

    <div class="input-group">
        <input type="tel" id="phoneInput" placeholder="Ex: +2250546384306 ou 0546384306" value="+2250546384306">
        <button id="analyzeBtn">Analyser</button>
    </div>

    <div id="resultArea" class="result">
        <!-- contenu dynamique -->
        <div style="text-align:center; color:#7c86a3;">🔎 Entrez un numéro et cliquez sur Analyser</div>
    </div>
    <footer>✅ Simulation basée sur des heuristiques réalistes (activité, ancienneté, signalements, fiabilité réseau)</footer>
    <div class="creator-credit">✨ Créé par <span>dev 𝑪𝒊𝒇𝒆𝒓</span></div>
</div>

<script>
    // Fonction pour générer des métriques cohérentes mais "réalistes" selon le numéro (simulation)
    // Le but : chaque numéro aura un profil unique basé sur son pattern + indicatif + longueur
    function genererAnalyse(numeroRaw) {
        // Nettoyer le numéro
        let numero = numeroRaw.replace(/\s/g, '');
        if (!numero.startsWith('+')) {
            // si pas d'indicatif, on suppose +225 par défaut (Côte d'Ivoire)
            if (/^0?[0-9]{8,9}$/.test(numero)) {
                numero = '+225' + numero.replace(/^0+/, '');
            } else {
                numero = '+' + numero.replace(/^\+/, '');
            }
        }
        
        // Seed basé sur les chiffres pour générer des résultats cohérents mais variés
        let hash = 0;
        for (let i = 0; i < numero.length; i++) {
            hash = ((hash << 5) - hash) + numero.charCodeAt(i);
            hash |= 0;
        }
        // valeur pseudo-aléatoire déterministe entre 0 et 1
        let seed = Math.abs(hash % 1000) / 1000;
        
        // Tendance de base : l'indicatif influence (+225 bonne réputation)
        let reputationBase = 0.70;
        if (numero.includes('+225')) reputationBase = 0.78;
        if (numero.includes('+33')) reputationBase = 0.82;
        if (numero.includes('+1')) reputationBase = 0.75;
        if (numero.includes('+44')) reputationBase = 0.80;
        
        // Générer 4 métriques avec cohérence
        let activite = 0.45 + (seed * 0.5);
        let anciennete = 0.30 + (Math.sin(seed * 15) * 0.3 + 0.4);
        let fiabiliteReseau = 0.65 + (reputationBase * 0.25) + (Math.cos(seed * 7) * 0.08);
        let signalement = 0.20 + (seed * 0.7);
        
        // on bride et on évite les extrêmes trop faibles / hauts pour rendre réaliste
        activite = Math.min(0.94, Math.max(0.28, activite));
        anciennete = Math.min(0.92, Math.max(0.20, anciennete));
        fiabiliteReseau = Math.min(0.96, Math.max(0.55, fiabiliteReseau));
        signalement = Math.min(0.85, Math.max(0.12, signalement));
        
        // Indice de solidité = moyenne pondérée (coeff: activite 30%, anciennete 25%, fiabilité 30%, signalement inverse 15%)
        let solidite = (activite * 0.30) + (anciennete * 0.25) + (fiabiliteReseau * 0.30) + ((1 - signalement) * 0.15);
        solidite = Math.min(0.98, Math.max(0.45, solidite));
        let soliditePercent = Math.round(solidite * 100);
        
        // texte de statut personnalisé
        let statutMessage = "";
        let couleurSolidite = "";
        if (soliditePercent >= 80) {
            statutMessage = "✔️ COMPTE SÉCURISÉ – Très bonne fiabilité";
            couleurSolidite = "#34d399";
        } else if (soliditePercent >= 65) {
            statutMessage = "⚠️ COMPTE SÉCURISÉ – Surveillance recommandée";
            couleurSolidite = "#fbbf24";
        } else {
            statutMessage = "❓ COMPTE À RISQUE – Vérification nécessaire";
            couleurSolidite = "#f9736b";
        }
        
        // formater les métriques en %
        let activitePercent = Math.round(activite * 100);
        let anciennetePercent = Math.round(anciennete * 100);
        let fiabilitePercent = Math.round(fiabiliteReseau * 100);
        let signalementPercent = Math.round(signalement * 100);
        
        // date fictive "analyse du jour"
        let today = new Date();
        let dateStr = today.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' }) + " " + today.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
        
        return {
            numero: numero,
            dateAnalyse: dateStr,
            solidite: soliditePercent,
            activite: activitePercent,
            anciennete: anciennetePercent,
            fiabilite: fiabilitePercent,
            signalement: signalementPercent,
            statut: statutMessage,
            couleurStatut: couleurSolidite
        };
    }
    
    function afficherAnalyse(data) {
        let html = `
            <div class="numero">📞 ${data.numero}</div>
            <div class="solidite">
                <div>
                    <div style="font-size:0.7rem; text-transform:uppercase; letter-spacing:1px;">INDICE DE SOLIDITÉ</div>
                    <div class="pourcentage">${data.solidite}%</div>
                </div>
                <div class="badge" style="background:${data.couleurStatut}20; color:${data.couleurStatut}; border:1px solid ${data.couleurStatut}50;">
                    ${data.statut.includes("SURVEILLANCE") ? "🔍" : (data.solidite>=80 ? "🛡️" : "⚠️")} ${data.statut}
                </div>
            </div>
            <div style="font-size:0.7rem; color:#b9c3e6; margin-top:-8px; margin-bottom:10px;">Analysé le ${data.dateAnalyse}</div>
            
            <div class="grid-metrics">
                <div class="metric">
                    <span>📱 Activité récente</span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="bar-bg"><div class="bar-fill" style="width:${data.activite}%;"></div></div>
                        <span class="value">${data.activite}%</span>
                    </div>
                </div>
                <div class="metric">
                    <span>📅 Ancienneté du compte</span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="bar-bg"><div class="bar-fill" style="width:${data.anciennete}%;"></div></div>
                        <span class="value">${data.anciennete}%</span>
                    </div>
                </div>
                <div class="metric">
                    <span>🌐 Fiabilité réseau</span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="bar-bg"><div class="bar-fill" style="width:${data.fiabilite}%;"></div></div>
                        <span class="value">${data.fiabilite}%</span>
                    </div>
                </div>
                <div class="metric">
                    <span>🚨 Indice de signalement</span>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="bar-bg"><div class="bar-fill" style="width:${data.signalement}%; background:#f9736b;"></div></div>
                        <span class="value">${data.signalement}%</span>
                    </div>
                </div>
            </div>
            <div class="warning">
                💡 ${data.solidite >= 80 ? "Ce numéro présente un excellent indice de solidité. Peu de signalements récents." : 
                    (data.solidite >= 65 ? "Ce numéro présente un bon indice de solidité. Surveillance recommandée sur les échanges sensibles." : 
                    "Soyez vigilant : plusieurs indicateurs suggèrent une activité suspecte ou un compte récent.")}
            </div>
        `;
        document.getElementById('resultArea').innerHTML = html;
    }
    
    // EVENEMENT
    const btn = document.getElementById('analyzeBtn');
    const inputField = document.getElementById('phoneInput');
    
    function runAnalysis() {
        let rawNumber = inputField.value.trim();
        if (rawNumber === "") {
            document.getElementById('resultArea').innerHTML = `<div style="text-align:center; color:#f9736b;">❌ Veuillez entrer un numéro de téléphone</div>`;
            return;
        }
        const analyseData = genererAnalyse(rawNumber);
        afficherAnalyse(analyseData);
    }
    
    btn.addEventListener('click', runAnalysis);
    inputField.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') runAnalysis();
    });
    
    // simulation au chargement avec l'exemple fourni dans l'image
    window.addEventListener('DOMContentLoaded', () => {
        runAnalysis();
    });
</script>
</body>
</html>
